<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="P2P记事本">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>P2P记事本 · 6位数字连接</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4A90D9;
      --primary-dark: #357ABD;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #2c3e50;
      --text-secondary: #5a6c7d;
      --border: #e1e8ed;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 20px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 span {
      background: var(--primary);
      color: white;
      font-size: 14px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 6px;
    }

    .connection-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0f3f7;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-dot.connected {
      background: #2ecc71;
      box-shadow: 0 0 8px #2ecc71aa;
    }

    .note-editor {
      width: 100%;
      min-height: 220px;
      background: #f9fafc;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      color: var(--text);
      transition: border 0.2s;
      font-family: inherit;
    }
    .note-editor:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .btn {
      background: white;
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .btn:active {
      transform: scale(0.96);
      background: #f0f4fa;
    }
    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(74,144,217,0.3);
    }
    .btn.primary:active {
      background: var(--primary-dark);
    }

    .peer-id-display {
      font-size: 22px;
      font-weight: 700;
      background: #edf2f9;
      padding: 8px 16px;
      border-radius: 20px;
      color: var(--primary-dark);
      letter-spacing: 2px;
      text-align: center;
      font-family: monospace;
    }

    .sync-indicator {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    .footer-note {
      font-size: 12px;
      color: #95a5b3;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>
        📝 同步记事本
        <span>P2P</span>
      </h1>
      <div class="connection-badge" id="connectionBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">离线</span>
      </div>
    </div>

    <textarea id="noteTextarea" class="note-editor" placeholder="写点什么... 内容会自动同步给已连接的伙伴"></textarea>

    <div class="actions">
      <button class="btn" id="copyIdBtn" title="复制我的6位ID">
        📋 复制我的ID
      </button>
      <button class="btn primary" id="connectBtn">
        🔗 连接伙伴
      </button>
    </div>

    <div style="display: flex; align-items: center; gap: 8px; justify-content: space-between; flex-wrap: wrap;">
      <div class="peer-id-display" id="myPeerId">------</div>
      <div class="sync-indicator" id="syncMessage">✎ 本地编辑</div>
    </div>

    <hr>
    <div class="footer-note">
      PWA · WebRTC 点对点加密同步 · 6位数字ID
    </div>
  </div>

  <script type="module">
    import Peer from 'https://cdn.skypack.dev/peerjs@1.4.7?min';

    const noteTextarea = document.getElementById('noteTextarea');
    const myPeerIdSpan = document.getElementById('myPeerId');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const copyIdBtn = document.getElementById('copyIdBtn');
    const connectBtn = document.getElementById('connectBtn');
    const syncMessage = document.getElementById('syncMessage');

    let peer = null;
    let currentConnection = null;
    let myPeerId = '';
    let isConnected = false;
    let ignoreNextTextChange = false;

    // 生成6位随机数字ID (100000-999999)
    function generateSixDigitId() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    async function initializePeer() {
      const peerId = generateSixDigitId();
      myPeerId = peerId;
      myPeerIdSpan.textContent = peerId;

      peer = new Peer(peerId, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        debug: 0
      });

      peer.on('open', (id) => {
        console.log('✅ Peer 启动, 6位ID:', id);
        myPeerId = id;
        myPeerIdSpan.textContent = id;
        updateConnectionStatus(false);
      });

      peer.on('connection', (conn) => {
        console.log('📞 收到连接请求来自:', conn.peer);
        if (currentConnection && currentConnection.peer !== conn.peer) {
          currentConnection.close();
        }
        setupConnection(conn);
      });

      peer.on('error', (err) => {
        console.error('Peer错误:', err);
        alert('连接服务出错: ' + err.message);
        updateConnectionStatus(false);
      });

      peer.on('disconnected', () => {
        console.log('Peer断开，尝试重连...');
        peer.reconnect();
      });
    }

    function setupConnection(conn) {
      if (currentConnection) {
        currentConnection.close();
      }
      currentConnection = conn;
      isConnected = true;
      updateConnectionStatus(true);

      conn.on('data', (data) => {
        if (data && data.type === 'note-update' && typeof data.content === 'string') {
          ignoreNextTextChange = true;
          noteTextarea.value = data.content;
          syncMessage.textContent = '✅ 已同步远程笔记';
          setTimeout(() => { syncMessage.textContent = '🔗 已连接 · 实时同步'; }, 2000);
        }
      });

      conn.on('close', () => {
        if (currentConnection === conn) {
          currentConnection = null;
          isConnected = false;
          updateConnectionStatus(false);
          syncMessage.textContent = '⚠️ 连接断开';
        }
      });

      conn.on('error', () => {
        isConnected = false;
        updateConnectionStatus(false);
      });

      if (noteTextarea.value.trim() !== '') {
        sendNoteUpdate(noteTextarea.value);
      }
      syncMessage.textContent = '🔗 已连接 · 实时同步';
    }

    function sendNoteUpdate(content) {
      if (currentConnection && currentConnection.open) {
        currentConnection.send({
          type: 'note-update',
          content: content,
          timestamp: Date.now()
        });
        syncMessage.textContent = '📤 已发送';
        setTimeout(() => {
          if (isConnected) syncMessage.textContent = '🔗 已连接 · 实时同步';
        }, 1000);
      }
    }

    function updateConnectionStatus(connected) {
      isConnected = connected;
      if (connected) {
        statusDot.className = 'status-dot connected';
        statusText.textContent = '已连接';
        connectBtn.textContent = '🔗 已连接';
        connectBtn.classList.remove('primary');
      } else {
        statusDot.className = 'status-dot';
        statusText.textContent = '离线';
        connectBtn.textContent = '🔗 连接伙伴';
        connectBtn.classList.add('primary');
        syncMessage.textContent = '✎ 本地编辑';
      }
    }

    function connectToPeer() {
      if (!peer) return;
      const targetId = prompt('请输入对方的6位数字ID:', '');
      if (!targetId || targetId.trim() === '') return;
      if (!/^\d{6}$/.test(targetId.trim())) {
        alert('请输入6位数字ID');
        return;
      }
      if (targetId.trim() === myPeerId) {
        alert('不能连接自己');
        return;
      }

      if (currentConnection) {
        currentConnection.close();
      }

      const conn = peer.connect(targetId.trim(), { reliable: true });
      conn.on('open', () => {
        setupConnection(conn);
      });
      conn.on('error', (err) => {
        alert('连接失败: ' + err.message);
        updateConnectionStatus(false);
      });
    }

    function copyMyId() {
      if (!myPeerId) return;
      navigator.clipboard.writeText(myPeerId).then(() => {
        alert('已复制ID: ' + myPeerId);
      }).catch(() => {
        prompt('手动复制ID:', myPeerId);
      });
    }

    noteTextarea.addEventListener('input', () => {
      if (ignoreNextTextChange) {
        ignoreNextTextChange = false;
        return;
      }
      if (isConnected && currentConnection && currentConnection.open) {
        sendNoteUpdate(noteTextarea.value);
      } else {
        syncMessage.textContent = '✎ 本地编辑 (未连接)';
      }
    });

    copyIdBtn.addEventListener('click', copyMyId);
    connectBtn.addEventListener('click', connectToPeer);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✅ SW注册成功', reg.scope))
          .catch(err => console.error('SW注册失败:', err));
      });
    }

    initializePeer();

    window.addEventListener('beforeunload', () => {
      if (currentConnection) currentConnection.close();
      if (peer) peer.destroy();
    });
  </script>
</body>
</html>
