<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5c542">
  <title>闪记 · P2P备忘录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #fef9e7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 800px;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(10px);
    }
    .header {
      background: #fde68a;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #fcd34d;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #78350f;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-area {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fffbeb;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #92400e;
      border: 1px solid #fcd34d;
    }
    .sync-area input {
      width: 70px;
      border: none;
      background: transparent;
      font-weight: 600;
      text-align: center;
      font-size: 0.9rem;
      color: #78350f;
      outline: none;
      letter-spacing: 2px;
    }
    .sync-area button {
      background: #fbbf24;
      border: none;
      color: #78350f;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
      white-space: nowrap;
    }
    .sync-area button:active { background: #f59e0b; }
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fffbeb;
    }
    .note-card {
      background: white;
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      border: 1px solid #fde68a;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .note-card:active { background: #fef3c7; }
    .note-content {
      flex: 1;
    }
    .note-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: #1e293b;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .note-body {
      font-size: 0.9rem;
      color: #475569;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #b91c1c;
      margin-left: 10px;
      opacity: 0.7;
      transition: 0.2s;
      padding: 0 4px;
    }
    .delete-btn:hover { opacity: 1; }
    .fab {
      background: #fbbf24;
      border: none;
      color: #78350f;
      font-size: 2.2rem;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      bottom: 20px;
      right: 20px;
      box-shadow: 0 10px 20px rgba(251,191,36,0.4);
      cursor: pointer;
      transition: 0.2s;
      z-index: 10;
    }
    .fab:active { transform: scale(0.94); }
    .empty-state {
      text-align: center;
      color: #a8a29e;
      margin-top: 40px;
      font-style: italic;
    }
    .modal-overlay {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal {
      background: white;
      width: 90%;
      max-width: 380px;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal input, .modal textarea {
      width: 100%;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      font-size: 1rem;
      background: #f8fafc;
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 25px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel { background: #e2e8f0; color: #334155; }
    .btn-save { background: #fbbf24; color: #78350f; }
    .connection-indicator {
      font-size: 0.7rem;
      background: #dcfce7;
      padding: 2px 8px;
      border-radius: 12px;
      color: #166534;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="header">
    <h1>📒 闪记</h1>
    <div class="sync-area">
      <span id="connStatus" class="connection-indicator">🔴 未连接</span>
      <input type="text" id="pinInput" placeholder="密码" maxlength="6" inputmode="numeric" pattern="[0-9]*">
      <button id="syncBtn">连接</button>
    </div>
  </div>

  <div class="notes-list" id="notesList">
    <!-- 动态渲染笔记 -->
  </div>

  <button class="fab" id="addNoteBtn">+</button>
</div>

<!-- 新建/编辑笔记模态框 -->
<div class="modal-overlay" id="noteModal" style="display: none;">
  <div class="modal">
    <input type="text" id="noteTitleInput" placeholder="标题" maxlength="60">
    <textarea id="noteContentInput" placeholder="写点什么..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="cancelNoteBtn">取消</button>
      <button class="btn btn-save" id="saveNoteBtn">保存</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 数据存储 ----------
    const STORAGE_KEY = 'pwa_memo_notes';
    let notes = []; // { id, title, content, updatedAt }

    // 加载本地笔记
    function loadNotesFromStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          notes = JSON.parse(stored);
        } else {
          notes = [];
        }
      } catch (e) {
        notes = [];
      }
      // 保证每个笔记有id
      notes = notes.filter(n => n && typeof n === 'object').map(n => ({
        ...n,
        id: n.id || crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random()
      }));
    }

    function saveNotesToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // 渲染列表
    const notesListEl = document.getElementById('notesList');
    function renderNotes() {
      if (!notesListEl) return;
      if (notes.length === 0) {
        notesListEl.innerHTML = '<div class="empty-state">✨ 还没有笔记，点 + 创建</div>';
        return;
      }
      notesListEl.innerHTML = notes.map(note => {
        const title = escapeHtml(note.title || '无标题');
        const content = escapeHtml(note.content || '');
        return `
          <div class="note-card" data-id="${note.id}">
            <div class="note-content">
              <div class="note-title">${title}</div>
              <div class="note-body">${content.substring(0, 80)}${content.length>80?'…':''}</div>
            </div>
            <button class="delete-btn" data-action="delete" data-id="${note.id}">🗑️</button>
          </div>
        `;
      }).join('');

      // 绑定删除事件
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          deleteNoteById(id);
        });
      });

      // 点击卡片编辑（可选简单编辑：这里复用模态框）
      document.querySelectorAll('.note-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('[data-action="delete"]')) return;
          const id = card.getAttribute('data-id');
          openEditorForNote(id);
        });
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function deleteNoteById(id) {
      notes = notes.filter(n => n.id !== id);
      saveNotesAndSync();
      renderNotes();
    }

    function saveNotesAndSync() {
      saveNotesToStorage();
      // 如果已连接，发送同步数据
      if (isConnected && peerConnection && dataChannel && dataChannel.readyState === 'open') {
        sendNotesViaDataChannel();
      }
    }

    // 模态框逻辑
    const modal = document.getElementById('noteModal');
    const titleInput = document.getElementById('noteTitleInput');
    const contentInput = document.getElementById('noteContentInput');
    let currentEditId = null; // 正在编辑的笔记id

    function openNewNoteModal() {
      currentEditId = null;
      titleInput.value = '';
      contentInput.value = '';
      modal.style.display = 'flex';
      titleInput.focus();
    }

    function openEditorForNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      currentEditId = id;
      titleInput.value = note.title || '';
      contentInput.value = note.content || '';
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
      currentEditId = null;
    }

    document.getElementById('addNoteBtn').addEventListener('click', openNewNoteModal);
    document.getElementById('cancelNoteBtn').addEventListener('click', closeModal);
    document.getElementById('saveNoteBtn').addEventListener('click', () => {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();
      if (!title && !content) {
        alert('请输入标题或内容');
        return;
      }
      if (currentEditId) {
        // 编辑现有笔记
        const note = notes.find(n => n.id === currentEditId);
        if (note) {
          note.title = title;
          note.content = content;
          note.updatedAt = Date.now();
        }
      } else {
        // 新建笔记
        const newNote = {
          id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random(),
          title: title,
          content: content,
          updatedAt: Date.now()
        };
        notes.push(newNote);
      }
      saveNotesAndSync();
      renderNotes();
      closeModal();
    });

    // 点击模态框外部关闭
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ---------- WebRTC P2P 同步 ----------
    let peerConnection = null;
    let dataChannel = null;
    let isConnected = false;
    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    const PIN_LENGTH = 6;
    let localPin = null; // 本机设定的6位密码(用于连接)

    const connStatusSpan = document.getElementById('connStatus');
    const pinInput = document.getElementById('pinInput');
    const syncBtn = document.getElementById('syncBtn');

    function updateConnectionStatus(text, color = '#166534', bg = '#dcfce7') {
      connStatusSpan.textContent = text;
      connStatusSpan.style.background = bg;
      connStatusSpan.style.color = color;
    }

    // 发送所有笔记
    function sendNotesViaDataChannel() {
      if (!dataChannel || dataChannel.readyState !== 'open') return;
      const payload = {
        type: 'notes-sync',
        notes: notes,
        timestamp: Date.now()
      };
      dataChannel.send(JSON.stringify(payload));
    }

    // 接收并合并笔记 (简单合并：根据id覆盖，保留最新updatedAt)
    function mergeReceivedNotes(receivedNotes) {
      if (!Array.isArray(receivedNotes)) return;
      let changed = false;
      const noteMap = new Map(notes.map(n => [n.id, n]));
      receivedNotes.forEach(rn => {
        if (!rn || !rn.id) return;
        const existing = noteMap.get(rn.id);
        if (!existing || (rn.updatedAt && rn.updatedAt > (existing.updatedAt || 0))) {
          noteMap.set(rn.id, { ...rn });
          changed = true;
        }
      });
      if (changed) {
        notes = Array.from(noteMap.values());
        saveNotesToStorage();
        renderNotes();
      }
    }

    function setupDataChannel(channel) {
      dataChannel = channel;
      channel.onopen = () => {
        isConnected = true;
        updateConnectionStatus('🟢 已同步', '#166534', '#dcfce7');
        sendNotesViaDataChannel(); // 连接后立即同步
      };
      channel.onclose = () => {
        isConnected = false;
        updateConnectionStatus('🔴 未连接', '#991b1b', '#fee2e2');
        dataChannel = null;
      };
      channel.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'notes-sync' && Array.isArray(data.notes)) {
            mergeReceivedNotes(data.notes);
          }
        } catch (e) {}
      };
    }

    async function createPeerConnectionAsInitiator() {
      peerConnection = new RTCPeerConnection(configuration);
      dataChannel = peerConnection.createDataChannel('memo-sync');
      setupDataChannel(dataChannel);

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          // 在真实场景中通过信令服务器交换，这里使用简化密码机制模拟信令
        }
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      // 将offer SDP通过密码渠道发送给对端（模拟：存储到localStorage共享空间？不可行）
      // 由于没有信令服务器，采用小技巧：利用同一设备不同窗口测试？这里使用BroadcastChannel模拟同一浏览器上下文？
      // 设计要求六位密码直连，实际P2P需要信令交换。我们使用localStorage作为简易信令(仅同源演示)
      // 但跨设备需要真实信令。为满足“6位数密码连接”概念，采用基于密码的简单房间机制：
      // 通过BroadcastChannel API在同源上下文通信；跨设备采用手动复制SDP？保留设计意图。
      // 此处实现基于密码的“房间”概念：使用localStorage事件模拟信令（仅演示，同浏览器可用）
      window.localStorage.setItem('webrtc_offer_'+localPin, JSON.stringify({ type: 'offer', sdp: peerConnection.localDescription }));
    }

    async function handleOffer(offerSdp) {
      peerConnection = new RTCPeerConnection(configuration);
      peerConnection.ondatachannel = (event) => {
        setupDataChannel(event.channel);
      };
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          window.localStorage.setItem('webrtc_candidate_'+localPin, JSON.stringify({ candidate: event.candidate }));
        }
      };
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      window.localStorage.setItem('webrtc_answer_'+localPin, JSON.stringify({ type: 'answer', sdp: peerConnection.localDescription }));
    }

    async function handleAnswer(answerSdp) {
      if (!peerConnection) return;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(answerSdp));
    }

    async function addIceCandidate(candidate) {
      if (peerConnection) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      }
    }

    // 监听localStorage变化作为简易信令 (仅同源)
    window.addEventListener('storage', (e) => {
      if (!localPin) return;
      if (e.key === 'webrtc_offer_'+localPin && e.newValue) {
        const data = JSON.parse(e.newValue);
        if (data.type === 'offer' && !peerConnection) {
          handleOffer(data.sdp);
        }
      } else if (e.key === 'webrtc_answer_'+localPin && e.newValue) {
        const data = JSON.parse(e.newValue);
        if (data.type === 'answer') {
          handleAnswer(data.sdp);
        }
      } else if (e.key === 'webrtc_candidate_'+localPin && e.newValue) {
        const data = JSON.parse(e.newValue);
        if (data.candidate) addIceCandidate(data.candidate);
      }
    });

    // 开始连接：输入6位密码
    syncBtn.addEventListener('click', async () => {
      const pin = pinInput.value.trim();
      if (pin.length !== PIN_LENGTH || !/^\d{6}$/.test(pin)) {
        alert('请输入6位数字密码');
        return;
      }
      localPin = pin;
      updateConnectionStatus('⏳ 连接中...', '#92400e', '#fef3c7');
      // 清理旧连接
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      dataChannel = null;
      isConnected = false;

      // 清除之前信令存储
      ['offer','answer','candidate'].forEach(t => localStorage.removeItem('webrtc_'+t+'_'+pin));

      // 作为发起者创建offer
      await createPeerConnectionAsInitiator();
      // 同时监听answer
    });

    // 初始化加载
    loadNotesFromStorage();
    renderNotes();

    // 注册Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered');
        }).catch(err => console.log('SW failed', err));
      });
    }
  })();
</script>
</body>
</html>
