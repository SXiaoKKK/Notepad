<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f5f7">
  <title>轻笔记 · P2P备忘录</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05), 0 8px 16px rgba(0,0,0,0.02);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
      position: relative;
      backdrop-filter: blur(10px);
    }
    .header {
      padding: 20px 20px 10px;
      background: #ffffff;
      border-bottom: 1px solid #f0f0f5;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.5px;
    }
    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      background: #f8f8fc;
      border-radius: 20px;
      padding: 8px 16px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .room-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1c1c1e;
    }
    .room-code {
      font-family: 'Menlo', monospace;
      background: #e5e5ea;
      padding: 4px 12px;
      border-radius: 14px;
      letter-spacing: 2px;
      font-weight: 600;
    }
    .btn {
      background: #007aff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #007aff;
      white-space: nowrap;
    }
    .btn:active { opacity: 0.7; transform: scale(0.96); }
    .btn-secondary {
      background: #e9e9ef;
      color: #000;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 13px;
    }
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .note-card {
      background: #ffffff;
      border: 1px solid #f0f0f5;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: 0.1s;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .note-content {
      flex: 1;
      cursor: pointer;
    }
    .note-title {
      font-weight: 600;
      font-size: 17px;
      color: #000;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .note-body {
      font-size: 14px;
      color: #3a3a3c;
      line-height: 1.4;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .delete-btn {
      background: transparent;
      border: none;
      color: #c7c7cc;
      font-size: 20px;
      padding: 0 4px;
      cursor: pointer;
      border-radius: 12px;
      transition: 0.1s;
      margin-left: 8px;
    }
    .delete-btn:hover, .delete-btn:active { color: #ff3b30; }
    .empty-state {
      text-align: center;
      color: #8e8e93;
      padding: 40px 16px;
      font-size: 15px;
    }
    .fab {
      position: sticky;
      bottom: 20px;
      align-self: flex-end;
      background: #007aff;
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(0,122,255,0.3);
      cursor: pointer;
      margin: 8px 16px 16px;
      border: none;
      transition: 0.2s;
    }
    .fab:active { transform: scale(0.92); }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e5e5ea;
      border-radius: 16px;
      font-size: 16px;
      outline: none;
      background: #f9f9fc;
    }
    textarea { resize: vertical; min-height: 100px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="header">
    <h1>📝 备忘录</h1>
    <div class="sync-bar">
      <div class="room-info" id="roomDisplay">
        <span>🔗</span> <span id="roomCodeText">未连接</span>
      </div>
      <div style="display: flex; gap: 6px;">
        <button class="btn btn-small" id="createRoomBtn">创建房间</button>
        <button class="btn btn-small btn-secondary" id="joinRoomBtn">加入</button>
      </div>
    </div>
  </div>

  <div class="notes-list" id="notesListContainer">
    <div class="empty-state">暂无笔记，点击下方➕新建</div>
  </div>

  <button class="fab" id="addNoteFab">+</button>
</div>

<!-- 新建/编辑笔记模态框 -->
<div class="modal hidden" id="noteModal">
  <div class="modal-card">
    <input type="text" id="noteTitleInput" placeholder="标题" autofocus>
    <textarea id="noteContentInput" placeholder="内容..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelNoteBtn">取消</button>
      <button class="btn" id="saveNoteBtn">保存</button>
    </div>
  </div>
</div>

<!-- 加入房间模态框 -->
<div class="modal hidden" id="joinModal">
  <div class="modal-card">
    <h3>输入6位房间密码</h3>
    <input type="text" id="roomCodeInput" placeholder="123456" maxlength="6" inputmode="numeric" pattern="[0-9]*">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelJoinBtn">取消</button>
      <button class="btn" id="confirmJoinBtn">连接</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 数据模型 ----------
    let notes = [];                 // { id, title, content }
    let currentPeerConnection = null;
    let dataChannel = null;
    let isCreator = false;
    let roomCode = null;
    let pendingCandidates = [];

    // DOM元素
    const notesListEl = document.getElementById('notesListContainer');
    const roomCodeTextEl = document.getElementById('roomCodeText');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const addFab = document.getElementById('addNoteFab');
    const noteModal = document.getElementById('noteModal');
    const noteTitleInput = document.getElementById('noteTitleInput');
    const noteContentInput = document.getElementById('noteContentInput');
    const saveNoteBtn = document.getElementById('saveNoteBtn');
    const cancelNoteBtn = document.getElementById('cancelNoteBtn');
    const joinModal = document.getElementById('joinModal');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const confirmJoinBtn = document.getElementById('confirmJoinBtn');
    const cancelJoinBtn = document.getElementById('cancelJoinBtn');

    // 当前编辑的笔记ID (null表示新建)
    let editingNoteId = null;

    // ---------- 工具函数 ----------
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }

    function generateRoomCode() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // 渲染笔记列表
    function renderNotes() {
      if (!notesListEl) return;
      if (notes.length === 0) {
        notesListEl.innerHTML = '<div class="empty-state">✨ 空空如也，新建一条笔记吧</div>';
        return;
      }
      notesListEl.innerHTML = notes.map(note => `
        <div class="note-card" data-id="${note.id}">
          <div class="note-content" data-id="${note.id}">
            <div class="note-title">${escapeHtml(note.title) || '无标题'}</div>
            <div class="note-body">${escapeHtml(note.content) || ''}</div>
          </div>
          <button class="delete-btn" data-id="${note.id}" aria-label="删除">🗑️</button>
        </div>
      `).join('');

      // 绑定点击事件（编辑）
      document.querySelectorAll('.note-content').forEach(el => {
        el.addEventListener('click', (e) => {
          const id = el.dataset.id;
          openEditor(id);
        });
      });
      // 绑定删除事件
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          deleteNoteById(id);
        });
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // 打开编辑器（新建或编辑）
    function openEditor(noteId = null) {
      editingNoteId = noteId;
      if (noteId) {
        const note = notes.find(n => n.id === noteId);
        if (note) {
          noteTitleInput.value = note.title;
          noteContentInput.value = note.content;
        }
      } else {
        noteTitleInput.value = '';
        noteContentInput.value = '';
      }
      noteModal.classList.remove('hidden');
      noteTitleInput.focus();
    }

    function closeEditor() {
      noteModal.classList.add('hidden');
      editingNoteId = null;
    }

    // 保存笔记
    function saveNoteFromEditor() {
      const title = noteTitleInput.value.trim();
      const content = noteContentInput.value.trim();
      if (!title && !content) {
        alert('标题或内容不能全空');
        return;
      }
      
      if (editingNoteId) {
        // 更新现有笔记
        const note = notes.find(n => n.id === editingNoteId);
        if (note) {
          note.title = title;
          note.content = content;
        }
      } else {
        // 新建笔记
        const newNote = {
          id: generateId(),
          title: title,
          content: content,
        };
        notes.push(newNote);
      }
      
      renderNotes();
      closeEditor();
      // 同步数据到对等端
      sendNotesViaDataChannel();
    }

    function deleteNoteById(id) {
      notes = notes.filter(n => n.id !== id);
      renderNotes();
      sendNotesViaDataChannel();
    }

    // ---------- WebRTC 信令与数据通道 ----------
    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function resetConnection() {
      if (dataChannel) {
        dataChannel.close();
        dataChannel = null;
      }
      if (currentPeerConnection) {
        currentPeerConnection.close();
        currentPeerConnection = null;
      }
      pendingCandidates = [];
    }

    function updateRoomUI(code = null) {
      if (code) {
        roomCodeTextEl.textContent = `房间 ${code}`;
        roomCode = code;
      } else {
        roomCodeTextEl.textContent = '未连接';
        roomCode = null;
      }
    }

    // 发送笔记数据
    function sendNotesViaDataChannel() {
      if (dataChannel && dataChannel.readyState === 'open') {
        const payload = JSON.stringify({ type: 'notes-update', notes: notes });
        dataChannel.send(payload);
      }
    }

    // 处理接收到的消息
    function onDataChannelMessage(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'notes-update' && Array.isArray(data.notes)) {
          // 简单合并策略：完全替换为远程笔记（保证同步）
          notes = data.notes;
          renderNotes();
        }
      } catch (e) {
        console.warn('解析消息失败', e);
      }
    }

    function setupDataChannel(channel) {
      dataChannel = channel;
      dataChannel.onmessage = onDataChannelMessage;
      dataChannel.onopen = () => {
        console.log('数据通道已打开');
        // 如果是创建者，立即发送当前笔记
        if (isCreator) {
          sendNotesViaDataChannel();
        }
      };
      dataChannel.onclose = () => {
        console.log('数据通道关闭');
        dataChannel = null;
      };
    }

    // 创建PeerConnection
    async function createPeerConnection() {
      resetConnection();
      const pc = new RTCPeerConnection(configuration);
      currentPeerConnection = pc;

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          // 通过信令机制传递candidate（这里简化：通过复制粘贴或手动？但我们使用本地存储模拟？）
          // 实际P2P需要信令服务器，但这里采用“手动交换”思路：我们将ICE候选存储在全局，通过房间密码交换？
          // 为演示可行，我们使用一个简单的技巧：将offer/answer和candidates存入localStorage，通过相同房间密码共享。
          pendingCandidates.push(event.candidate);
          // 存储到本地，以便另一方读取（模拟信令）
          if (roomCode) {
            saveSignalingData(roomCode, { candidates: pendingCandidates, type: 'candidates' });
          }
        }
      };

      pc.onconnectionstatechange = () => {
        console.log('连接状态:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          console.log('P2P已连接');
        } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          updateRoomUI(null);
        }
      };

      // 如果作为创建者，创建数据通道
      if (isCreator) {
        const channel = pc.createDataChannel('notepad-sync');
        setupDataChannel(channel);
      } else {
        pc.ondatachannel = (event) => {
          setupDataChannel(event.channel);
        };
      }

      return pc;
    }

    // 使用localStorage模拟信令交换 (基于房间密码)
    function saveSignalingData(code, data) {
      localStorage.setItem(`notepad_sig_${code}`, JSON.stringify(data));
    }

    function loadSignalingData(code) {
      const raw = localStorage.getItem(`notepad_sig_${code}`);
      return raw ? JSON.parse(raw) : null;
    }

    function clearSignalingData(code) {
      localStorage.removeItem(`notepad_sig_${code}`);
    }

    // 创建房间（发起者）
    async function createRoom() {
      resetConnection();
      isCreator = true;
      const code = generateRoomCode();
      updateRoomUI(code);
      const pc = await createPeerConnection();
      
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      
      // 存储offer到信令区
      saveSignalingData(code, { type: 'offer', sdp: pc.localDescription });
      
      // 轮询等待answer (简单轮询)
      pollForAnswer(code, pc);
    }

    function pollForAnswer(code, pc) {
      const interval = setInterval(async () => {
        const data = loadSignalingData(code);
        if (data && data.type === 'answer' && pc.signalingState !== 'stable') {
          clearInterval(interval);
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
          // 添加之前存储的候选
          applyPendingCandidates(pc, code);
          clearSignalingData(code); // 清理
        }
      }, 1000);
    }

    async function applyPendingCandidates(pc, code) {
      const sig = loadSignalingData(code);
      if (sig && sig.candidates) {
        for (const cand of sig.candidates) {
          try { await pc.addIceCandidate(new RTCIceCandidate(cand)); } catch(e){}
        }
      }
    }

    // 加入房间
    async function joinRoom(code) {
      resetConnection();
      isCreator = false;
      updateRoomUI(code);
      const pc = await createPeerConnection();
      
      // 获取offer
      const offerData = loadSignalingData(code);
      if (!offerData || offerData.type !== 'offer') {
        alert('未找到该房间，请确认密码正确或房主已创建');
        updateRoomUI(null);
        return;
      }
      
      await pc.setRemoteDescription(new RTCSessionDescription(offerData.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      
      // 存储answer
      saveSignalingData(code, { type: 'answer', sdp: pc.localDescription });
      
      // 添加ICE候选
      applyPendingCandidates(pc, code);
      
      // 持续监听candidates更新
    }

    // 界面事件绑定
    createRoomBtn.addEventListener('click', async () => {
      try {
        await createRoom();
      } catch (e) {
        alert('创建房间失败: ' + e.message);
        console.error(e);
      }
    });

    joinRoomBtn.addEventListener('click', () => {
      joinModal.classList.remove('hidden');
      roomCodeInput.value = '';
      roomCodeInput.focus();
    });

    cancelJoinBtn.addEventListener('click', () => joinModal.classList.add('hidden'));
    
    confirmJoinBtn.addEventListener('click', async () => {
      const code = roomCodeInput.value.trim();
      if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        alert('请输入6位数字密码');
        return;
      }
      joinModal.classList.add('hidden');
      try {
        await joinRoom(code);
      } catch (e) {
        alert('加入失败: ' + e.message);
        updateRoomUI(null);
      }
    });

    addFab.addEventListener('click', () => openEditor(null));
    saveNoteBtn.addEventListener('click', saveNoteFromEditor);
    cancelNoteBtn.addEventListener('click', closeEditor);

    // 初始渲染
    renderNotes();

    // 注册Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  })();
</script>
</body>
</html>
